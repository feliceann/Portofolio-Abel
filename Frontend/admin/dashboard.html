<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin - Portofolio</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="/admin/dashboard.html">Abel Admin</a>
      <a href="#dashboard">Dashboard</a>
      <a href="#profile">Profil</a>
      <a href="#skills">Skill</a>
      <a href="#experiences">Pengalaman</a>
      <a href="#projects">Proyek</a>
      <a href="#contacts">Kontak</a>
      <button id="logoutBtn">Keluar</button>
    </aside>

    <main class="admin-main">
      <section id="dashboard">
        <div class="section-header">
          <h1>Dashboard</h1>
          <a class="secondary-link" href="/" target="_blank">Lihat Halaman Utama</a>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
      </section>

      <section id="profile">
        <h2>Profil</h2>
        <form class="panel grid-form" id="profileForm">
          <input name="nama_lengkap" placeholder="Nama lengkap" required />
          <input name="nama_panggilan" placeholder="Nama panggilan" />
          <input name="tempat_lahir" placeholder="Tempat lahir" />
          <input name="tanggal_lahir" type="date" />
          <input name="email" type="email" placeholder="Email" />
          <input name="telepon" placeholder="Telepon" />
          <input name="universitas" placeholder="Universitas" />
          <input name="fakultas" placeholder="Fakultas" />
          <input name="prodi" placeholder="Program studi" />
          <input name="semester" type="number" placeholder="Semester" />
          <input name="alamat" class="wide" placeholder="Alamat" />
          <div class="wide upload-row">
            <input name="foto_url" id="foto_url" placeholder="URL foto profil Cloudinary" />
            <input type="file" id="profileImage" accept="image/*" />
            <button type="button" id="uploadProfileBtn">Upload Foto</button>
          </div>
          <button type="submit" class="wide">Simpan Profil</button>
        </form>
      </section>

      <section id="skills">
        <h2>Skill</h2>
        <form class="panel inline-form" id="skillForm">
          <input type="hidden" name="id" />
          <input name="nama_skill" placeholder="Nama skill" required />
          <input name="icon_class" placeholder="Class icon, contoh: fas fa-code" />
          <button type="submit">Simpan</button>
          <button type="button" data-reset="skillForm">Reset</button>
        </form>
        <div class="table-wrap"><table id="skillsTable"></table></div>
      </section>

      <section id="experiences">
        <h2>Pengalaman</h2>
        <form class="panel grid-form" id="experienceForm">
          <input type="hidden" name="id" />
          <input name="posisi" placeholder="Posisi" required />
          <input name="perusahaan" placeholder="Perusahaan/organisasi" required />
          <input name="durasi" placeholder="Durasi" required />
          <textarea name="deskripsi" class="wide" placeholder="Deskripsi"></textarea>
          <button type="submit" class="wide">Simpan Pengalaman</button>
        </form>
        <div class="table-wrap"><table id="experiencesTable"></table></div>
      </section>

      <section id="projects">
        <h2>Proyek</h2>
        <form class="panel grid-form" id="projectForm">
          <input type="hidden" name="id" />
          <input name="judul" placeholder="Judul proyek" required />
          <input name="link_project" placeholder="Link proyek/demo" />
          <textarea name="deskripsi" class="wide" placeholder="Deskripsi proyek" required></textarea>
          <div class="wide upload-row">
            <input name="gambar_url" id="gambar_url" placeholder="URL gambar Cloudinary" />
            <input type="file" id="projectImage" accept="image/*" />
            <button type="button" id="uploadProjectBtn">Upload Gambar</button>
          </div>
          <button type="submit" class="wide">Simpan Proyek</button>
        </form>
        <div class="table-wrap"><table id="projectsTable"></table></div>
      </section>

      <section id="contacts">
        <h2>Kontak</h2>
        <div class="table-wrap"><table id="contactsTable"></table></div>
      </section>

      <div class="toast" id="toast"></div>
    </main>

    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/admin.js"></script>
  </body>
</html>
